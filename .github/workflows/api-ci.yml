name: API CI

on:pull_request:
push:
  branches:[main]

  jobs:
    test:
      runs-on: ubuntu-latest
      steps:
        - users: actions/checkout@v4

        - users: oven-sh/setup-bun@v2
          with:
            bun-version: latest

        - name: Install dependencies
          run: bun install --frozen-lockfile

        - name: Run tests
          working-directory: apps/api
          run: bun test
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build API
        run: bunx wrangler deploy --dry-run
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build Web
        run: bunx expo export --platform web
        working-directory: apps/mobile
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/mobile/dist

  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run database migrations
        run: bun run db:migrate
        working-directory: packages/db
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy-api:
    needs: [build-api, migrate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Deploy API to Cloudflare Workers
        run: bunx wrangler deploy
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-web:
    needs: [build-web, deploy-api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/mobile/dist
      - name: Deploy Web to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: know-your-meals
          directory: apps/mobile/dist

  release:
    needs: [deploy-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Escape version for shields.io
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          escaped="${REF_NAME//-/--}"
          echo "escaped=$escaped" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            <div align="center">

            # 🍚 Know Your Meals — ${{ github.ref_name }}

            ![Version](https://img.shields.io/badge/version-${{ steps.version.outputs.escaped }}-ff6b6b?style=for-the-badge&logo=github)
            ![Status](https://img.shields.io/badge/status-pre--release-orange?style=for-the-badge)
            ![Bun](https://img.shields.io/badge/runtime-Bun-fbf0df?style=for-the-badge&logo=bun)

            </div>

            ---

            ## ✨ このリリースのハイライト

            > *(リリース後にここを編集してください)*

            ---
